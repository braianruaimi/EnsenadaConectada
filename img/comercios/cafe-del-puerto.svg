<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400e" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)" />
  <circle cx="680" cy="90"  r="120" fill="rgba(255,255,255,0.07)" />
  <circle cx="120" cy="360" r="150" fill="rgba(255,255,255,0.06)" />
  <!-- Ícono de taza -->
  <g transform="translate(320, 90)" fill="rgba(255,255,255,0.15)">
    <rect x="30" y="40" width="100" height="80" rx="8" />
    <rect x="130" y="55" width="25" height="50" rx="12" />
    <rect x="20" y="120" width="120" height="12" rx="4" />
    <!-- Vapor -->
    <path d="M50 30 Q55 15 50 0" stroke="rgba(255,255,255,0.3)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M80 25 Q85 10 80 0" stroke="rgba(255,255,255,0.3)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M110 30 Q115 15 110 0" stroke="rgba(255,255,255,0.3)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <text x="70" y="155" fill="#fde68a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Gastronomía</text>
  <text x="70" y="255" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="88">CP</text>
  <text x="70" y="320" fill="#e7e5e4" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">Café del Puerto</text>
</svg>
