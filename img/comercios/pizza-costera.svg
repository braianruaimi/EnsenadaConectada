<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)" />
  <circle cx="680" cy="90"  r="120" fill="rgba(255,255,255,0.07)" />
  <circle cx="120" cy="360" r="150" fill="rgba(255,255,255,0.06)" />
  <!-- Ícono de pizza -->
  <g transform="translate(300, 65)">
    <circle cx="100" cy="100" r="95"  fill="rgba(255,255,255,0.12)" />
    <circle cx="100" cy="100" r="70"  fill="rgba(255,255,255,0.08)" />
    <!-- Rebanada -->
    <path d="M100 100 L100 5 A95 95 0 0 1 185 148 Z" fill="rgba(255,255,255,0.16)" />
    <!-- Pepperoni decorativo -->
    <circle cx="130" cy="60"  r="10" fill="rgba(255,100,80,0.4)" />
    <circle cx="155" cy="100" r="8"  fill="rgba(255,100,80,0.4)" />
    <circle cx="135" cy="130" r="9"  fill="rgba(255,100,80,0.4)" />
  </g>
  <text x="70" y="155" fill="#fca5a5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Gastronomía</text>
  <text x="70" y="255" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="88">PC</text>
  <text x="70" y="320" fill="#fee2e2" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">Pizza Costera</text>
</svg>
