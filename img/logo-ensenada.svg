<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
  </defs>

  <!-- Pin de ubicación estilizado -->
  <g transform="translate(6, 6)">
    <circle cx="18" cy="16" r="11" fill="url(#pin)" />
    <circle cx="18" cy="16" r="5"  fill="white" opacity="0.9" />
    <!-- Punta del pin -->
    <polygon points="18,36 11,24 25,24" fill="url(#pin)" />
  </g>

  <!-- Nombre del directorio -->
  <text x="46" y="22"
    fill="#1e3a8a"
    font-family="Inter, Arial, sans-serif"
    font-weight="800"
    font-size="18"
    letter-spacing="-0.3">Ensenada</text>
  <text x="46" y="42"
    fill="#3b82f6"
    font-family="Inter, Arial, sans-serif"
    font-weight="600"
    font-size="15"
    letter-spacing="0.5">Conectada</text>
</svg>
