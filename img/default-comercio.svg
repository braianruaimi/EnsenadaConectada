<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- Decoración: círculos translúcidos -->
  <circle cx="700" cy="80"  r="130" fill="rgba(255,255,255,0.06)" />
  <circle cx="100" cy="370" r="160" fill="rgba(255,255,255,0.05)" />
  <circle cx="400" cy="225" r="200" fill="rgba(255,255,255,0.03)" />

  <!-- Ícono de comercio genérico (tienda) -->
  <g transform="translate(280, 110)">
    <!-- Techo de la tienda -->
    <polygon points="120,0 240,80 0,80" fill="rgba(255,255,255,0.15)" />
    <!-- Cuerpo de la tienda -->
    <rect x="20" y="80" width="200" height="130" fill="rgba(255,255,255,0.10)" rx="4" />
    <!-- Puerta -->
    <rect x="90" y="130" width="60" height="80" fill="rgba(255,255,255,0.15)" rx="4" />
    <!-- Ventana izquierda -->
    <rect x="30"  y="95" width="45" height="35" fill="rgba(255,255,255,0.12)" rx="3" />
    <!-- Ventana derecha -->
    <rect x="165" y="95" width="45" height="35" fill="rgba(255,255,255,0.12)" rx="3" />
    <!-- Letrero de la tienda -->
    <rect x="20" y="80" width="200" height="25" fill="url(#badge)" rx="2" opacity="0.7" />
  </g>

  <!-- Texto principal -->
  <text x="400" y="310"
    fill="#ffffff"
    font-family="Inter, Arial, sans-serif"
    font-weight="800"
    font-size="32"
    text-anchor="middle"
    letter-spacing="1">Ensenada Conectada</text>

  <!-- Texto secundario -->
  <text x="400" y="350"
    fill="#bfdbfe"
    font-family="Inter, Arial, sans-serif"
    font-size="18"
    text-anchor="middle"
    letter-spacing="0.5">Imagen no disponible</text>

  <!-- Línea decorativa -->
  <line x1="320" y1="325" x2="480" y2="325" stroke="#60a5fa" stroke-width="1.5" opacity="0.5" />
</svg>
